<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header, footer {
            background-color: #333;
            color: white;
            padding: 10px;
        }
        main {
            padding: 20px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            text-decoration: none;
            color: #007BFF;
        }
        a:hover {
            text-decoration: underline;
        }
        .image-list img {
            width: 150px;
            height: auto;
            margin: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1 ref="mainTitle">Bienvenue sur la page de test</h1>
    </header>
    <main>
        <h2>Section 1</h2>
        <p>Voici une liste de liens utiles :</p>
        <ul>
            <li><i class="fas fa-home"></i> <a href="#">Accueil</a></li>
            <li><i class="fas fa-info-circle"></i> <a href="#">À propos</a></li>
            <li><i class="fas fa-envelope"></i> <a href="#">Contact</a></li>
        </ul>
        <h2>Galerie d'images</h2>
        <ul class="image-list" id="images">
            <li><a href="#"><img src="https://via.placeholder.com/150" alt="Image 1"></a></li>
            <li><a href="#"><img src="https://via.placeholder.com/150" alt="Image 2"></a></li>
            <li><a href="#"><img src="https://via.placeholder.com/150" alt="Image 3"></a></li>
        </ul>
    </main>
    <div class="multi  spaced  classes" data-role="container">
        <span class="highlight" data-id="1">Text 1</span>
        <span class="highlight" data-id="2">Text 2</span>
        <br>
        <hr>
        <span class="highlight" data-id="3">Text 3</span>
    </div>
    <footer>
        <p>&copy; 2025 Mon Site de Test</p>
    </footer>
</body>
</html>
